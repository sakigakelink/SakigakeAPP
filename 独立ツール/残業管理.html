<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超過勤務手当計算システム</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      color: #e8e8e8;
      padding: 1.5rem;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .header .subtitle { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .card {
      background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .card h2 { margin-bottom: 1rem; font-weight: 500; font-size: 1.1rem; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; padding: 0.7rem 1.2rem; border-radius: 8px;
      font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease;
      display: inline-flex; align-items: center; gap: 0.4rem; font-family: inherit;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .btn-pdf { background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%); }
    .upload-zone {
      display: block; border: 2px solid rgba(255, 255, 255, 0.3); border-radius: 12px;
      padding: 2rem; text-align: center; cursor: pointer; transition: all 0.3s ease;
      background: rgba(102, 126, 234, 0.1); margin-bottom: 1rem;
    }
    .upload-zone:hover { border-color: #667eea; background: rgba(102, 126, 234, 0.2); }
    .upload-zone.loaded { border-color: #38ef7d; background: rgba(56, 239, 125, 0.1); }
    .upload-zone input { display: none; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .stat-card { background: rgba(102, 126, 234, 0.15); border-radius: 10px; padding: 1rem; text-align: center; }
    .stat-value {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-label { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); margin-top: 0.3rem; }
    .table-container { overflow-x: auto; border-radius: 10px; background: rgba(0, 0, 0, 0.2); margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { padding: 0.6rem 0.8rem; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
    th { background: #1e2a4a; font-weight: 500; position: sticky; top: 0; }
    tr:hover td { background: rgba(255, 255, 255, 0.05); }
    .pay-value { font-weight: 500; color: #38ef7d; }
    .warning { color: #ff6b6b; font-size: 0.75rem; }
    .btn-group { display: flex; gap: 0.8rem; flex-wrap: wrap; }
    .hidden { display: none !important; }
    .scrollable-table { max-height: 600px; overflow-y: auto; }
    .header-info { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 0.8rem; font-size: 0.85rem; }
    .header-info code { background: rgba(102, 126, 234, 0.3); padding: 0.15rem 0.4rem; border-radius: 4px; margin: 0 0.15rem; }
    .master-status { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; padding: 0.8rem; background: rgba(0,0,0,0.2); border-radius: 8px; }
    .master-status .count { font-size: 1.2rem; font-weight: bold; color: #667eea; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 超過勤務手当計算システム</h1>
      <div class="subtitle">職員マスタを読み込み、Excelファイルから手当を計算</div>
    </div>

    <div id="step1">
      <div class="card">
        <h2>1. 職員マスタ読み込み</h2>
        <label class="upload-zone" id="masterZone">
          <input type="file" id="masterFile" accept=".json">
          <div style="font-size: 2rem; margin-bottom: 0.5rem;">👤</div>
          <div style="font-size: 1rem;">employees.json をアップロード</div>
          <div style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 0.3rem;">クリックまたはドラッグ＆ドロップ</div>
        </label>
        <div id="masterFileName" style="display:none; color: #38ef7d; font-size: 0.9rem; margin-top: 0.5rem;"></div>
        <div class="master-status">
          <span>登録職員数:</span>
          <span class="count" id="baseInfoCount">0</span>
          <span>名</span>
        </div>
      </div>
      
      <div class="card">
        <h2>2. 勤怠データ読み込み</h2>
        <label class="upload-zone" id="uploadZone">
          <input type="file" id="fileInput" accept=".xlsx,.xls">
          <div style="font-size: 2rem; margin-bottom: 0.5rem;">📁</div>
          <div style="font-size: 1rem;">Excelファイルをアップロード</div>
          <div style="color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-top: 0.3rem;">クリックまたはドラッグ＆ドロップ</div>
        </label>
        <div class="header-info">
          <strong>📋 必要なヘッダー:</strong>
          <code>名前</code> <code>総合計超過時間</code> <code>超勤</code> <code>1300</code> <code>1600</code>
        </div>
      </div>
    </div>

    <div class="card hidden" id="step2">
      <h2>計算結果</h2>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-value" id="resultCount">0</div><div class="stat-label">計算済み</div></div>
        <div class="stat-card"><div class="stat-value" id="totalSubtotal">¥0</div><div class="stat-label">小計合計</div></div>
        <div class="stat-card"><div class="stat-value" id="totalFukukgyoPay">¥0</div><div class="stat-label">副業手当計</div></div>
        <div class="stat-card"><div class="stat-value" id="grandTotal">¥0</div><div class="stat-label">総合計</div></div>
        <div class="stat-card"><div class="stat-value" id="unmatchedCount">0</div><div class="stat-label">未照合</div></div>
      </div>
      <div class="table-container scrollable-table">
        <table>
          <thead><tr><th>職員番号</th><th>名前</th><th>超勤手当</th><th>1300手当</th><th>1600手当</th><th>小計</th><th>超過時間</th><th>総労働時間</th><th>副業手当</th></tr></thead>
          <tbody id="resultsTable"></tbody>
        </table>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="resetCalc()">← 戻る</button>
        <button class="btn btn-secondary" onclick="exportToExcel()">📥 Excel</button>
        <button class="btn btn-pdf" onclick="exportToPDF()">📄 PDF</button>
      </div>
    </div>
  </div>

  <script>
    let employees = [];
    let empMapByName = {};
    let workData = [];
    let results = [];

    function calcOvertimeRate(emp) {
      // 月額合計 ÷ 月所定時間 = 時給 → ÷ 3600 = 秒単価
      const total = (emp.baseSalary || 0) + (emp.adjustment || 0) + (emp.position || 0);
      return total / 157.5 / 3600;
    }

    function normalizeName(name) {
      if (!name) return '';
      return String(name).replace(/\s+/g, '').replace(/　/g, '').toLowerCase();
    }

    function updateEmpMap() {
      empMapByName = {};
      employees.forEach(emp => {
        empMapByName[normalizeName(emp.name)] = { id: emp.id, rate: calcOvertimeRate(emp), emp: emp };
      });
    }

    function updateBaseInfoCount() {
      document.getElementById('baseInfoCount').textContent = employees.length;
    }

    function applyMasterData(data, sourceName) {
      // { version, employees: [...] } 形式と配列形式の両方に対応
      if (data && Array.isArray(data.employees)) {
        employees = data.employees;
      } else if (Array.isArray(data)) {
        employees = data;
      } else {
        throw new Error('配列形式ではありません');
      }
      updateEmpMap();
      updateBaseInfoCount();
      document.getElementById('masterZone').classList.add('loaded');
      document.getElementById('masterFileName').style.display = 'block';
      document.getElementById('masterFileName').textContent = '✅ ' + sourceName;
    }

    function loadMasterFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          applyMasterData(JSON.parse(e.target.result), file.name);
        } catch (err) {
          alert('JSON読込エラー: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    document.getElementById('fileInput').addEventListener('change', handleFileUpload);
    document.getElementById('masterFile').addEventListener('change', (e) => { if (e.target.files[0]) loadMasterFile(e.target.files[0]); });

    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.style.borderColor = '#667eea'; });
    uploadZone.addEventListener('dragleave', () => { uploadZone.style.borderColor = 'rgba(255,255,255,0.3)'; });
    uploadZone.addEventListener('drop', (e) => { e.preventDefault(); uploadZone.style.borderColor = 'rgba(255,255,255,0.3)'; if (e.dataTransfer.files[0]) { uploadZone.classList.add('loaded'); processFile(e.dataTransfer.files[0]); } });

    const masterZone = document.getElementById('masterZone');
    masterZone.addEventListener('dragover', (e) => { e.preventDefault(); masterZone.style.borderColor = '#667eea'; });
    masterZone.addEventListener('dragleave', () => { masterZone.style.borderColor = 'rgba(255,255,255,0.3)'; });
    masterZone.addEventListener('drop', (e) => { e.preventDefault(); masterZone.style.borderColor = 'rgba(255,255,255,0.3)'; if (e.dataTransfer.files[0]) loadMasterFile(e.dataTransfer.files[0]); });

    function handleFileUpload(e) { if (e.target.files[0]) processFile(e.target.files[0]); }

    function processFile(file) {
      if (employees.length === 0) { alert('先に職員マスタ（employees.json）を読み込んでください'); return; }
      const reader = new FileReader();
      reader.onload = (evt) => {
        const data = new Uint8Array(evt.target.result);
        const workbook = XLSX.read(data, { type: 'array', cellDates: true });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        let headerRow = 1;
        let colMap = findHeaders(sheet, 1);
        if (!colMap.name) { colMap = findHeaders(sheet, 2); headerRow = 2; }
        if (!colMap.name) { alert('ヘッダーが見つかりません'); return; }
        workData = [];
        let row = headerRow + 1;
        while (true) {
          const nameCell = sheet[colMap.name + row];
          if (!nameCell || !nameCell.v) break;
          workData.push({
            name: String(nameCell.v),
            totalOvertimeRaw: colMap.totalOvertime ? (sheet[colMap.totalOvertime + row]?.v || null) : null,
            overtimeSeconds: colMap.overtime ? (sheet[colMap.overtime + row]?.v || 0) : 0,
            col1300: colMap.col1300 ? (sheet[colMap.col1300 + row]?.v || null) : null,
            col1600: colMap.col1600 ? (sheet[colMap.col1600 + row]?.v || null) : null,
            fukugyo: colMap.fukugyo ? (sheet[colMap.fukugyo + row]?.v || 0) : 0
          });
          row++;
        }
        if (workData.length === 0) { alert('データがありません'); return; }
        calculateAll();
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
      };
      reader.readAsArrayBuffer(file);
    }

    function findHeaders(sheet, rowNum) {
      const colMap = {};
      const patterns = { name: ['名前'], totalOvertime: ['総合計超過時間','総合計'], overtime: ['超勤'], col1300: ['1300'], col1600: ['1600'], fukugyo: ['副業','ﾌｸｷﾞｮｳ'] };
      const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
      for (let c = range.s.c; c <= range.e.c; c++) {
        const col = XLSX.utils.encode_col(c);
        const cell = sheet[col + rowNum];
        if (!cell || !cell.v) continue;
        const val = String(cell.v).trim();
        for (const [key, ps] of Object.entries(patterns)) {
          if (!colMap[key] && ps.some(p => val.includes(p))) colMap[key] = col;
        }
      }
      return colMap;
    }

    function timeToSeconds(val) {
      if (val === null || val === undefined || val === '' || val === 0) return 0;
      // Excel Date オブジェクト
      if (val instanceof Date) return val.getHours()*3600 + val.getMinutes()*60 + val.getSeconds();
      // 文字列 "HH:MM" or "HH:MM:SS"
      if (typeof val === 'string') {
        const p = val.split(':').map(Number);
        if (p.length >= 2 && p.every(n => !isNaN(n))) return p[0]*3600 + p[1]*60 + (p[2]||0);
        const num = parseFloat(val);
        if (!isNaN(num)) return timeToSeconds(num);
        return 0;
      }
      if (typeof val === 'number') {
        // Excelシリアル値: 0 < val < 1 の場合（1日 = 86400秒）
        if (val > 0 && val < 1) return Math.round(val * 86400);
        // 整数の場合はそのまま秒として扱う
        return Math.round(val);
      }
      return 0;
    }

    function secondsToTimeString(seconds) {
      if (!seconds) return '00:00';
      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
    }

    function secondsToTotalTime(seconds, baseHours = 157.5) {
      const totalSeconds = seconds + baseHours * 3600;
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      return `${h}:${String(m).padStart(2, '0')}`;
    }

    function calculateAll() {
      let unmatchedCount = 0;
      const defaultHourlyRate = 1300 / 3600;
      const rawResults = workData.map(w => {
        const normalizedName = normalizeName(w.name);
        const empData = empMapByName[normalizedName];
        const hasRate = empData !== undefined;
        const rate = hasRate ? empData.rate : defaultHourlyRate;
        const empId = hasRate ? empData.id : '';
        const overtimeSec = timeToSeconds(w.overtimeSeconds);
        const sec1300 = timeToSeconds(w.col1300);
        const sec1600 = timeToSeconds(w.col1600);
        const fugugyoCount = parseInt(w.fukugyo) || 0;
        const overtimePay = Math.ceil(overtimeSec * rate / 100) * 100;
        const pay1300 = Math.ceil(sec1300 * 1300 / 3600 / 100) * 100;
        const pay1600 = Math.ceil(sec1600 * 1600 / 3600 / 100) * 100;
        const payFukugyo = fugugyoCount * 1300;
        // 総合計超過時間がある場合はそれを使い、無い場合は各列を合算
        const rawTotalSec = timeToSeconds(w.totalOvertimeRaw);
        const totalOvertimeSec = rawTotalSec > 0 ? rawTotalSec : (overtimeSec + sec1300 + sec1600);
        return { id: empId, name: w.name, normalizedName, overtimePay, pay1300, pay1600, payFukugyo, totalOvertimeSec, hasRate };
      });
      const grouped = {};
      rawResults.forEach(r => {
        const key = r.normalizedName;
        if (!grouped[key]) grouped[key] = { id: r.id, name: r.name, overtimePay: 0, pay1300: 0, pay1600: 0, payFukugyo: 0, totalOvertimeSec: 0, hasRate: r.hasRate };
        grouped[key].overtimePay += r.overtimePay;
        grouped[key].pay1300 += r.pay1300;
        grouped[key].pay1600 += r.pay1600;
        grouped[key].payFukugyo += r.payFukugyo;
        grouped[key].totalOvertimeSec += r.totalOvertimeSec;
        if (r.id && !grouped[key].id) { grouped[key].id = r.id; grouped[key].hasRate = r.hasRate; }
      });
      results = Object.values(grouped).map(r => {
        if (!r.hasRate) unmatchedCount++;
        return { id: r.id, name: r.name, overtimePay: r.overtimePay, pay1300: r.pay1300, pay1600: r.pay1600, payFukugyo: r.payFukugyo,
          totalPay: r.overtimePay + r.pay1300 + r.pay1600 + r.payFukugyo,
          totalOvertimeTime: secondsToTimeString(r.totalOvertimeSec), totalWorkTime: secondsToTotalTime(r.totalOvertimeSec), hasRate: r.hasRate };
      });
      results.sort((a, b) => { if (!a.id && !b.id) return 0; if (!a.id) return 1; if (!b.id) return -1; return a.id.localeCompare(b.id, 'ja', { numeric: true }); });
      updateResults(unmatchedCount);
    }

    function updateResults(unmatchedCount) {
      document.getElementById('resultCount').textContent = results.length;
      const totalSubtotal = results.reduce((s, r) => s + r.overtimePay + r.pay1300 + r.pay1600, 0);
      document.getElementById('totalSubtotal').textContent = '¥' + totalSubtotal.toLocaleString();
      const totalFukugyo = results.reduce((s, r) => s + r.payFukugyo, 0);
      document.getElementById('totalFukukgyoPay').textContent = '¥' + totalFukugyo.toLocaleString();
      document.getElementById('grandTotal').textContent = '¥' + (totalSubtotal + totalFukugyo).toLocaleString();
      document.getElementById('unmatchedCount').textContent = unmatchedCount;
      document.getElementById('resultsTable').innerHTML = results.map(r => {
        const subtotal = r.overtimePay + r.pay1300 + r.pay1600;
        return `<tr><td>${r.id || '-'}${!r.hasRate ? ' <span class="warning">⚠</span>' : ''}</td><td>${r.name}</td>
          <td class="pay-value">${r.overtimePay > 0 ? '¥' + r.overtimePay.toLocaleString() : '-'}</td>
          <td class="pay-value">${r.pay1300 > 0 ? '¥' + r.pay1300.toLocaleString() : '-'}</td>
          <td class="pay-value">${r.pay1600 > 0 ? '¥' + r.pay1600.toLocaleString() : '-'}</td>
          <td class="pay-value" style="font-weight:bold;">${subtotal > 0 ? '¥' + subtotal.toLocaleString() : '-'}</td>
          <td>${r.totalOvertimeTime}</td><td>${r.totalWorkTime}</td>
          <td class="pay-value">${r.payFukugyo > 0 ? '¥' + r.payFukugyo.toLocaleString() : '-'}</td></tr>`;
      }).join('');
    }

    function resetCalc() {
      document.getElementById('step1').classList.remove('hidden');
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('fileInput').value = '';
    }

    function exportToExcel() {
      const wsData = [['職員番号', '名前', '超勤手当', '1300手当', '1600手当', '小計', '超過時間', '総労働時間', '副業手当']];
      results.forEach(r => { wsData.push([r.id, r.name, r.overtimePay, r.pay1300, r.pay1600, r.overtimePay+r.pay1300+r.pay1600, r.totalOvertimeTime, r.totalWorkTime, r.payFukugyo]); });
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '超過勤務手当');
      XLSX.writeFile(wb, '超過勤務手当計算結果.xlsx');
    }

    function exportToPDF() {
      const today = new Date().toLocaleDateString('ja-JP');
      const totalOvertimePay = results.reduce((s, r) => s + r.overtimePay, 0);
      const total1300Pay = results.reduce((s, r) => s + r.pay1300, 0);
      const total1600Pay = results.reduce((s, r) => s + r.pay1600, 0);
      const totalSubtotal = totalOvertimePay + total1300Pay + total1600Pay;
      const totalFukugyoPay = results.reduce((s, r) => s + r.payFukugyo, 0);
      const rowsHtml = results.map((r, i) => {
        const subtotal = r.overtimePay + r.pay1300 + r.pay1600;
        return `<tr style="background:${i%2===0?'#f8f9fa':'white'}">
          <td style="padding:6px;border-bottom:1px solid #ddd">${r.id||'-'}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd">${r.name}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:right">${r.overtimePay > 0 ? '¥' + r.overtimePay.toLocaleString() : '-'}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:right">${r.pay1300 > 0 ? '¥' + r.pay1300.toLocaleString() : '-'}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:right">${r.pay1600 > 0 ? '¥' + r.pay1600.toLocaleString() : '-'}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:right;font-weight:bold">${subtotal > 0 ? '¥' + subtotal.toLocaleString() : '-'}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:center">${r.totalOvertimeTime}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:center">${r.totalWorkTime}</td>
          <td style="padding:6px;border-bottom:1px solid #ddd;text-align:right">${r.payFukugyo > 0 ? '¥' + r.payFukugyo.toLocaleString() : '-'}</td></tr>`;
      }).join('');
      const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>超過勤務手当</title>
        <style>@media print{@page{size:A4 landscape;margin:10mm}}body{font-family:"Noto Sans JP",sans-serif;font-size:11px}
        h1{text-align:center;font-size:16px}table{width:100%;border-collapse:collapse;font-size:10px}
        th{background:#4a5568;color:white;padding:8px}</style></head>
        <body><h1>超過勤務手当計算結果</h1><p style="text-align:right;font-size:10px">出力日: ${today}</p>
        <p>対象: ${results.length}名　小計合計: ¥${totalSubtotal.toLocaleString()}　副業手当計: ¥${totalFukugyoPay.toLocaleString()}</p>
        <table><thead><tr><th>職員番号</th><th>名前</th><th>超勤手当</th><th>1300手当</th><th>1600手当</th><th>小計</th><th>超過時間</th><th>総労働</th><th>副業手当</th></tr></thead>
        <tbody>${rowsHtml}</tbody></table></body></html>`;
      const w = window.open('', '_blank');
      w.document.write(html);
      w.document.close();
      setTimeout(() => w.print(), 500);
    }
  </script>
</body>
</html>
