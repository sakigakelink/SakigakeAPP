<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>給与分析アプリ</title>
  <link rel="stylesheet" href="/static/css/design-system.css">
  <style>
    body { min-height: 100vh; padding: 1.5rem; }
    .container { max-width: 1400px; margin: 0 auto; position: relative; z-index: 1; }
    .header { text-align: center; margin-bottom: 1.5rem; padding: 1rem 0; border-bottom: 1px solid var(--sk-surface-border); }
    .header h1 { font-size: 1.5rem; font-weight: 700; color: var(--sk-primary); }
    .header .sub { font-size: .85rem; color: var(--sk-text-3); margin-top: .25rem; }

    .card { background: var(--sk-surface); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--sk-surface-border); border-radius: var(--sk-radius-lg); padding: 1.5rem; margin-bottom: 1.25rem; }
    .card h2 { margin-bottom: 1rem; font-weight: 600; font-size: 1.05rem; }

    .btn { background: var(--sk-grad-accent); color: #fff; border: none; padding: .55rem 1.1rem; border-radius: var(--sk-radius-sm); font-size: .85rem; font-weight: 500; cursor: pointer; font-family: var(--sk-font); display: inline-flex; align-items: center; gap: .4rem; transition: all .2s var(--sk-ease); }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,70,229,.2); }
    .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary { background: var(--sk-grad-success); }
    .btn-out { background: transparent; border: 1px solid var(--sk-surface-border); color: var(--sk-text-2); }
    .btn-out:hover { background: var(--sk-surface); transform: none; box-shadow: none; }

    .upload-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .upload-zone { display: block; border: 2px dashed rgba(148,163,184,.2); border-radius: var(--sk-radius-lg); padding: 1.2rem; text-align: center; cursor: pointer; transition: all .3s var(--sk-ease); background: rgba(30,64,175,.02); }
    .upload-zone:hover { border-color: var(--sk-primary); background: rgba(30,64,175,.05); box-shadow: 0 0 20px rgba(30,64,175,.06); }
    .upload-zone.loaded { border-color: var(--sk-success); border-style: solid; background: rgba(4,120,87,.04); }
    .upload-zone input { display: none; }
    .upload-label { font-weight: 500; font-size: 1rem; margin-bottom: .3rem; }
    .upload-status { font-size: .78rem; color: var(--sk-text-4); }
    .upload-zone.loaded .upload-status { color: var(--sk-success); }

    .btn-group { display: flex; gap: .8rem; flex-wrap: wrap; align-items: center; }
    .folder-btns { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .folder-btn { background: rgba(30,64,175,.05); border: 1px solid rgba(30,64,175,.15); color: var(--sk-text-2); padding: .4rem .8rem; border-radius: var(--sk-radius-sm); font-size: .82rem; cursor: pointer; font-family: var(--sk-font); transition: all .2s var(--sk-ease); }
    .folder-btn:hover { background: rgba(30,64,175,.1); border-color: rgba(30,64,175,.25); }
    .folder-btn.active { background: var(--sk-grad-primary); border-color: transparent; color: #fff; }

    .sg { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .sc { background: var(--sk-surface); border: 1px solid var(--sk-surface-border); border-radius: var(--sk-radius); padding: 1rem 1.25rem; text-align: center; transition: border-color .2s; }
    .sc:hover { border-color: rgba(30,64,175,.15); }
    .sv { font-size: 1.5rem; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--sk-text); letter-spacing: -.02em; }
    .sl { font-size: .75rem; color: var(--sk-text-3); margin-top: .3rem; }

    .tc { overflow-x: auto; border-radius: var(--sk-radius); background: rgba(255,255,255,.85); border: 1px solid var(--sk-surface-border); margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
    .st { max-height: 600px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    th, td { padding: .5rem .7rem; text-align: left; border-bottom: 1px solid rgba(148,163,184,.07); }
    th { background: var(--sk-bg-2); font-weight: 500; color: var(--sk-text-3); position: sticky; top: 0; white-space: nowrap; z-index: 5; border-bottom: 1px solid var(--sk-surface-border); }
    tr:hover td { background: rgba(30,64,175,.03); }
    .num { text-align: right; font-variant-numeric: tabular-nums; font-family: var(--sk-font-mono); }
    .pay-value { font-weight: 500; color: var(--sk-success); }
    .total-row td { background: rgba(30,64,175,.06) !important; font-weight: 600; border-top: 2px solid rgba(30,64,175,.25); color: var(--sk-primary); }
    .hidden { display: none !important; }

    .collapsible { cursor: pointer; user-select: none; display: flex; justify-content: space-between; align-items: center; }
    .collapsible:hover { opacity: .85; }
    .toggle-arrow { font-size: .8rem; transition: transform .2s; }
    .toggle-arrow.open { transform: rotate(180deg); }

    .loading { position: fixed; inset: 0; background: rgba(241,243,247,.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .loading-spinner { width: 40px; height: 40px; border: 3px solid var(--sk-bg-4); border-top-color: var(--sk-primary); border-radius: 50%; animation: sk-spin .8s linear infinite; }
    @keyframes sk-spin { to { transform: rotate(360deg); } }

    .tab-nav { display: flex; gap: .25rem; margin-bottom: 1.5rem; justify-content: center; padding: .25rem; background: var(--sk-bg-2); border-radius: var(--sk-radius); border: 1px solid var(--sk-surface-border); max-width: 400px; margin-left: auto; margin-right: auto; }
    .tab-btn { background: transparent; border: none; color: var(--sk-text-3); padding: .55rem 1.2rem; border-radius: var(--sk-radius-sm); font-size: .88rem; cursor: pointer; font-family: var(--sk-font); font-weight: 500; transition: all .2s var(--sk-ease); flex: 1; text-align: center; }
    .tab-btn:hover { color: var(--sk-text); background: rgba(30,64,175,.05); }
    .tab-btn.active { background: var(--sk-grad-primary); color: #fff; box-shadow: 0 2px 8px rgba(30,64,175,.25); }

    .sheets-section { margin-bottom: 1.5rem; }
    tr.collapsible { display: table-row; cursor: pointer; user-select: none; }
    tr.collapsible:hover td { background: rgba(30,64,175,.04); }
    .breakdown-row td { font-size: .78rem; color: var(--sk-text-3); }
    .breakdown-row td:first-child { padding-left: 2rem; }
    .period-badge { display: inline-block; background: rgba(30,64,175,.1); color: var(--sk-primary); padding: .2rem .6rem; border-radius: 20px; font-size: .82rem; margin-left: .5rem; font-weight: 500; }

    @media print {
      body { background: #fff !important; padding: 0; }
      body::before { display: none; }
      .card { background: none !important; backdrop-filter: none !important; padding: 0; margin-bottom: .8rem; }
      .upload-grid, .btn-group, .folder-btns, .loading, .btn, .tab-nav { display: none !important; }
      th { position: static !important; }
      .hidden { display: none !important; }
      .detail-content { display: block !important; }
    }
  </style>
</head>
<body class="sk-app">
<div class="container">
  <div class="header">
    <h1>給与分析アプリ</h1>
    <div class="sub">TKC PX2 一人別給与統計表 解析ダッシュボード</div>
  </div>

  <!-- タブナビゲーション -->
  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('pdf')">TKC PX2 分析</button>
    <button class="tab-btn" onclick="switchTab('sheets')">R7 支払い実績</button>
  </div>

  <!-- === TKC PX2 タブ === -->
  <div id="tabPDF">
  <!-- アップロードセクション -->
  <div class="card" id="uploadCard">
    <h2>PDF読込</h2>
    <div id="folderSection">
      <div style="font-size:.85rem;color:var(--sk-text-3);margin-bottom:.5rem">サーバー上のフォルダから読込:</div>
      <div class="folder-btns" id="folderBtns"></div>
      <div style="margin-top:.5rem">
        <button class="btn btn-secondary" id="loadAllBtn" onclick="loadAllFolders()">全月読込</button>
      </div>
    </div>
    <div style="font-size:.85rem;color:var(--sk-text-4);margin:1rem 0;text-align:center">── または PDFファイルをアップロード ──</div>
    <div class="upload-grid">
      <label class="upload-zone" data-key="ippan">
        <input type="file" accept=".pdf" data-key="ippan">
        <div class="upload-label">一般</div>
        <div class="upload-status">PDFを選択</div>
      </label>
      <label class="upload-zone" data-key="ishi">
        <input type="file" accept=".pdf" data-key="ishi">
        <div class="upload-label">医師</div>
        <div class="upload-status">PDFを選択</div>
      </label>
      <label class="upload-zone" data-key="chiiki">
        <input type="file" accept=".pdf" data-key="chiiki">
        <div class="upload-label">地域生活</div>
        <div class="upload-status">PDFを選択</div>
      </label>
      <label class="upload-zone" data-key="hijoukin">
        <input type="file" accept=".pdf" data-key="hijoukin">
        <div class="upload-label">非常勤</div>
        <div class="upload-status">PDFを選択</div>
      </label>
    </div>
    <div class="btn-group">
      <button class="btn" id="analyzeBtn" onclick="analyzeUpload()" disabled>解析実行</button>
      <button class="btn btn-out" onclick="clearAll()">クリア</button>
    </div>
  </div>

  <!-- 結果セクション -->
  <div id="results" class="hidden">
    <!-- サマリーカード -->
    <div class="card">
      <h2>総合サマリー <span class="period-badge" id="periodBadge"></span></h2>
      <div class="sg">
        <div class="sc"><div class="sv" id="statHeadcount">-</div><div class="sl">総人数</div></div>
        <div class="sc"><div class="sv" id="statShikyu">-</div><div class="sl">支給合計</div></div>
        <div class="sc"><div class="sv" id="statPerPerson">-</div><div class="sl">一人当たり</div></div>
        <div class="sc"><div class="sv" id="statAge">-</div><div class="sl">平均年齢</div></div>
        <div class="sc"><div class="sv" id="statTenure">-</div><div class="sl">平均勤続</div></div>
      </div>
    </div>

    <!-- 部門比較テーブル -->
    <div class="card">
      <h2>部門別比較</h2>
      <div class="tc">
        <table>
          <thead>
            <tr>
              <th>区分</th>
              <th class="num">人数</th>
              <th class="num">平均年齢</th>
              <th class="num">平均勤続</th>
              <th class="num">基本給計</th>
              <th class="num">手当計</th>
              <th class="num">時間外計</th>
              <th class="num">支給合計</th>
              <th class="num">一人当たり</th>
            </tr>
          </thead>
          <tbody id="catTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 部署別比較テーブル -->
    <div class="card">
      <h2>部署別比較（部課コード）</h2>
      <div class="tc">
        <table>
          <thead>
            <tr>
              <th>部課</th>
              <th class="num">人数</th>
              <th class="num">平均年齢</th>
              <th class="num">平均勤続</th>
              <th class="num">基本給計</th>
              <th class="num">手当計</th>
              <th class="num">時間外計</th>
              <th class="num">支給合計</th>
              <th class="num">一人当たり</th>
            </tr>
          </thead>
          <tbody id="bukaTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 月別推移（全月読込時のみ表示） -->
    <div class="card hidden" id="trendCard">
      <h2>月別推移</h2>
      <div class="tc">
        <table>
          <thead id="trendHead"></thead>
          <tbody id="trendBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 部門別月別推移（全月読込時のみ表示） -->
    <div class="card hidden" id="catTrendCard">
      <h2>部門別 月別推移（支給合計）</h2>
      <div class="tc">
        <table>
          <thead id="catTrendHead"></thead>
          <tbody id="catTrendBody"></tbody>
        </table>
      </div>
    </div>

    <!-- 個人別詳細 -->
    <div id="detailContainer"></div>
  </div>

  </div><!-- /tabPDF -->

  <!-- === R7 支払い実績タブ === -->
  <div id="tabSheets" class="hidden">
    <div id="sheetsContent">
      <div style="text-align:center;padding:3rem;color:rgba(255,255,255,.5)">読込中...</div>
    </div>
  </div>

</div><!-- /container -->

<!-- ローディング -->
<div class="loading hidden" id="loading">
  <div class="loading-spinner"></div>
</div>

<script>
const FILES = {};
let analysisData = null;

// ファイル選択
document.querySelectorAll('.upload-zone input[type="file"]').forEach(inp => {
  inp.addEventListener('change', e => {
    const key = e.target.dataset.key;
    const file = e.target.files[0];
    const zone = e.target.closest('.upload-zone');
    if (file) {
      FILES[key] = file;
      zone.classList.add('loaded');
      zone.querySelector('.upload-status').textContent = file.name;
    } else {
      delete FILES[key];
      zone.classList.remove('loaded');
      zone.querySelector('.upload-status').textContent = 'PDFを選択';
    }
    document.getElementById('analyzeBtn').disabled = !Object.keys(FILES).length;
  });
});

// フォルダ一覧取得
async function loadFolders() {
  try {
    const res = await fetch('/api/folders');
    const folders = await res.json();
    const container = document.getElementById('folderBtns');
    if (!folders.length) {
      container.innerHTML = '<span style="font-size:.82rem;color:rgba(255,255,255,.4)">月フォルダなし</span>';
      return;
    }
    container.innerHTML = folders.map(f =>
      `<button class="folder-btn" onclick="loadFolder('${f.name}')">${f.name} (${f.pdf_count}件)</button>`
    ).join('');
  } catch (e) { console.error(e); }
}

// フォルダ読込（キャッシュがあればそこから取得）
async function loadFolder(name) {
  document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (allMonthsData && allMonthsData.months && allMonthsData.months[name]) {
    const d = allMonthsData.months[name];
    analysisData = { categories: d.categories, combined: d.combined, buka_summary: d.buka_summary };
    renderDashboard();
    document.getElementById('results').classList.remove('hidden');
    return;
  }
  showLoading();
  try {
    const res = await fetch('/api/parse_folder', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ folder: name })
    });
    analysisData = await res.json();
    if (analysisData.error) { alert(analysisData.error); return; }
    renderDashboard();
  } catch (e) {
    alert('読込エラー: ' + e.message);
  } finally { hideLoading(); }
}

// アップロード解析
async function analyzeUpload() {
  const fd = new FormData();
  for (const [key, file] of Object.entries(FILES)) fd.append(key, file);
  hideTrendTables();
  showLoading();
  try {
    const res = await fetch('/api/parse', { method: 'POST', body: fd });
    analysisData = await res.json();
    if (analysisData.error) { alert(analysisData.error); return; }
    renderDashboard();
  } catch (e) {
    alert('解析エラー: ' + e.message);
  } finally { hideLoading(); }
}

function clearAll() {
  Object.keys(FILES).forEach(k => delete FILES[k]);
  document.querySelectorAll('.upload-zone').forEach(z => {
    z.classList.remove('loaded');
    z.querySelector('.upload-status').textContent = 'PDFを選択';
    z.querySelector('input').value = '';
  });
  document.querySelectorAll('.folder-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('results').classList.add('hidden');
  document.getElementById('trendCard').classList.add('hidden');
  document.getElementById('catTrendCard').classList.add('hidden');
  analysisData = null;
  allMonthsData = null;
}

function hideTrendTables() {
  document.getElementById('trendCard').classList.add('hidden');
  document.getElementById('catTrendCard').classList.add('hidden');
  allMonthsData = null;
}

// ダッシュボード描画
function renderDashboard() {
  const { combined, categories } = analysisData;
  const t = combined.totals;

  // 期間表示
  const periods = Object.values(categories).map(c => c.period).filter(Boolean);
  document.getElementById('periodBadge').textContent = periods[0] || '';

  // 統計カード
  document.getElementById('statHeadcount').textContent = t.headcount + '人';
  document.getElementById('statShikyu').textContent = yen(t['支給合計']);
  document.getElementById('statPerPerson').textContent = yen(t['一人当たり']);
  document.getElementById('statAge').textContent = t.avg_age + '歳';
  document.getElementById('statTenure').textContent = t.avg_tenure + '年';

  // 部門テーブル
  const tbody = document.getElementById('catTable');
  tbody.innerHTML = combined.category_summaries.map(c => `
    <tr>
      <td>${c.category}</td>
      <td class="num">${c.headcount}</td>
      <td class="num">${c.avg_age}歳</td>
      <td class="num">${c.avg_tenure}年</td>
      <td class="num">${yen(c['基本給計'])}</td>
      <td class="num">${yen(c['手当計'])}</td>
      <td class="num">${yen(c['時間外計'])}</td>
      <td class="num pay-value">${yen(c['支給合計'])}</td>
      <td class="num">${yen(c['一人当たり'])}</td>
    </tr>
  `).join('') + `
    <tr class="total-row">
      <td>合計</td>
      <td class="num">${t.headcount}</td>
      <td class="num">${t.avg_age}歳</td>
      <td class="num">${t.avg_tenure}年</td>
      <td class="num">${yen(sumField(combined.category_summaries, '基本給計'))}</td>
      <td class="num">${yen(sumField(combined.category_summaries, '手当計'))}</td>
      <td class="num">${yen(sumField(combined.category_summaries, '時間外計'))}</td>
      <td class="num pay-value">${yen(t['支給合計'])}</td>
      <td class="num">${yen(t['一人当たり'])}</td>
    </tr>
  `;

  // 部署別テーブル
  const bukaTbody = document.getElementById('bukaTable');
  const bukaData = analysisData.buka_summary || [];
  bukaTbody.innerHTML = bukaData.map(b => `
    <tr>
      <td>${b.buka}</td>
      <td class="num">${b.headcount}</td>
      <td class="num">${b.avg_age}歳</td>
      <td class="num">${b.avg_tenure}年</td>
      <td class="num">${yen(b['基本給計'])}</td>
      <td class="num">${yen(b['手当計'])}</td>
      <td class="num">${yen(b['時間外計'])}</td>
      <td class="num pay-value">${yen(b['支給合計'])}</td>
      <td class="num">${yen(b['一人当たり'])}</td>
    </tr>
  `).join('') + `
    <tr class="total-row">
      <td>合計</td>
      <td class="num">${sumField(bukaData, 'headcount')}</td>
      <td class="num">-</td>
      <td class="num">-</td>
      <td class="num">${yen(sumField(bukaData, '基本給計'))}</td>
      <td class="num">${yen(sumField(bukaData, '手当計'))}</td>
      <td class="num">${yen(sumField(bukaData, '時間外計'))}</td>
      <td class="num pay-value">${yen(sumField(bukaData, '支給合計'))}</td>
      <td class="num">${yen(Math.round(sumField(bukaData, '支給合計') / sumField(bukaData, 'headcount')))}</td>
    </tr>
  `;

  // 個人別詳細
  renderDetails(categories);

  document.getElementById('results').classList.remove('hidden');
  setTimeout(() => document.getElementById('results').scrollIntoView({ behavior: 'smooth' }), 100);
}

function renderDetails(categories) {
  const container = document.getElementById('detailContainer');
  container.innerHTML = '';

  for (const [label, data] of Object.entries(categories)) {
    if (data.error || !data.employees || !data.employees.length) continue;
    const emps = data.employees;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2 class="collapsible" onclick="toggleDetail(this)">
        <span>${label} (${emps.length}人)</span>
        <span class="toggle-arrow">&#9660;</span>
      </h2>
      <div class="detail-content hidden">
        <div class="tc"><div class="st">
          <table>
            <thead>
              <tr>
                <th>社員番号</th>
                <th>氏名</th>
                <th>性別</th>
                <th class="num">年齢</th>
                <th class="num">勤続</th>
                <th class="num">基本給</th>
                <th class="num">役職手当</th>
                <th class="num">調整手当</th>
                <th class="num">時間外</th>
                <th class="num">支給合計</th>
              </tr>
            </thead>
            <tbody>
              ${emps.map(e => `
                <tr>
                  <td>${e.taikei}-${e.buka}-${e.shain_no}</td>
                  <td>${e.name}</td>
                  <td>${e.gender}</td>
                  <td class="num">${e.age != null ? e.age + '歳' : '-'}</td>
                  <td class="num">${e.tenure != null ? e.tenure + '年' : '-'}</td>
                  <td class="num">${yen(e.salary['基本給'])}</td>
                  <td class="num">${yen(e.salary['役職手当'])}</td>
                  <td class="num">${yen(e.salary['調整手当'])}</td>
                  <td class="num">${yen(e.salary['時間外手当'])}</td>
                  <td class="num pay-value">${yen(e.salary['支給合計'])}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div></div>
      </div>
    `;
    container.appendChild(card);
  }
}

function toggleDetail(el) {
  const content = el.nextElementSibling;
  const arrow = el.querySelector('.toggle-arrow');
  content.classList.toggle('hidden');
  arrow.classList.toggle('open');
}

// ユーティリティ
function yen(n) {
  if (!n || n === 0) return '-';
  return n < 0
    ? '-' + Math.abs(n).toLocaleString('ja-JP')
    : n.toLocaleString('ja-JP');
}

function sumField(arr, field) {
  return arr.reduce((s, c) => s + (c[field] || 0), 0);
}

function showLoading() { document.getElementById('loading').classList.remove('hidden'); }
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

// 全月読込
let allMonthsData = null;

async function loadAllFolders() {
  showLoading();
  try {
    const res = await fetch('/api/parse_all_folders', { method: 'POST' });
    allMonthsData = await res.json();
    if (allMonthsData.error) { alert(allMonthsData.error); return; }

    // 最後の月のデータで既存ダッシュボードも表示
    const monthKeys = Object.keys(allMonthsData.months);
    if (monthKeys.length) {
      const lastMonth = monthKeys[monthKeys.length - 1];
      const lastData = allMonthsData.months[lastMonth];
      analysisData = {
        categories: lastData.categories,
        combined: lastData.combined,
        buka_summary: lastData.buka_summary,
      };
      renderDashboard();
    }

    renderTrendTable(allMonthsData.monthly_trend);
    renderCategoryTrendTable(allMonthsData.monthly_trend, allMonthsData.category_trend);
    document.getElementById('results').classList.remove('hidden');
  } catch (e) {
    alert('全月読込エラー: ' + e.message);
  } finally { hideLoading(); }
}

// 月別推移テーブル描画
function renderTrendTable(trend) {
  if (!trend || !trend.length) {
    document.getElementById('trendCard').classList.add('hidden');
    return;
  }
  document.getElementById('trendCard').classList.remove('hidden');

  const months = trend.map(t => t.month);
  const rows = [
    { label: '人数', field: 'headcount', format: v => v + '人' },
    { label: '支給合計', field: '支給合計', format: v => yen(v) },
    { label: '一人当たり', field: '一人当たり', format: v => yen(v) },
    { label: '基本給計', field: '基本給計', format: v => yen(v) },
    { label: '手当計', field: '手当計', format: v => yen(v) },
    { label: '時間外計', field: '時間外計', format: v => yen(v) },
  ];

  // ヘッダー
  document.getElementById('trendHead').innerHTML =
    '<tr><th>項目</th>' + months.map(m => `<th class="num">${m}</th>`).join('') + '</tr>';

  // ボディ
  document.getElementById('trendBody').innerHTML = rows.map(r => {
    const cls = r.field === '支給合計' ? 'num pay-value' : 'num';
    return '<tr><td>' + r.label + '</td>' +
      trend.map(t => `<td class="${cls}">${r.format(t[r.field])}</td>`).join('') +
      '</tr>';
  }).join('');
}

// 部門別月別推移テーブル描画
function renderCategoryTrendTable(trend, catTrend) {
  if (!catTrend || !catTrend.length) {
    document.getElementById('catTrendCard').classList.add('hidden');
    return;
  }
  document.getElementById('catTrendCard').classList.remove('hidden');

  const months = trend.map(t => t.month);
  const categories = [...new Set(catTrend.map(c => c.category))];

  // ヘッダー
  document.getElementById('catTrendHead').innerHTML =
    '<tr><th>区分</th>' + months.map(m => `<th class="num">${m}</th>`).join('') + '</tr>';

  // カテゴリ行
  const bodyRows = categories.map(cat => {
    return '<tr><td>' + cat + '</td>' +
      months.map(m => {
        const rec = catTrend.find(c => c.month === m && c.category === cat);
        return `<td class="num pay-value">${rec ? yen(rec['支給合計']) : '-'}</td>`;
      }).join('') + '</tr>';
  });

  // 合計行
  bodyRows.push(
    '<tr class="total-row"><td>合計</td>' +
    months.map(m => {
      const total = catTrend.filter(c => c.month === m).reduce((s, c) => s + (c['支給合計'] || 0), 0);
      return `<td class="num pay-value">${yen(total)}</td>`;
    }).join('') + '</tr>'
  );

  document.getElementById('catTrendBody').innerHTML = bodyRows.join('');
}

// === タブ切り替え ===
let sheetsDataLoaded = false;
let sheetsData = null;

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'pdf' && i === 0) || (tab === 'sheets' && i === 1));
  });
  document.getElementById('tabPDF').classList.toggle('hidden', tab !== 'pdf');
  document.getElementById('tabSheets').classList.toggle('hidden', tab !== 'sheets');
  if (tab === 'sheets' && !sheetsDataLoaded) loadSheetsData();
}

async function loadSheetsData() {
  try {
    const res = await fetch('/api/sheets_data');
    if (!res.ok) { document.getElementById('sheetsContent').innerHTML = '<div class="card"><p>R7支払いデータなし</p></div>'; return; }
    sheetsData = await res.json();
    sheetsDataLoaded = true;
    renderSheetsTab();
  } catch (e) {
    document.getElementById('sheetsContent').innerHTML = '<div class="card"><p>読込エラー: ' + e.message + '</p></div>';
  }
}

function renderSheetsTab() {
  const d = sheetsData;
  const ms = d.months;
  const sumArr = arr => arr.reduce((a, b) => a + b, 0);

  let html = '';

  // サマリーカード
  html += '<div class="card"><h2>R7 支払い実績サマリー</h2><div class="sg">';
  const cards = [
    ['給与費合計', sumArr(d.grand_total_payroll)],
    ['社会保険料', sumArr(d.grand_total_social)],
    ['医師計', sumArr(d.doctors_subtotal)],
    ['一般職員計', sumArr(d.staff_total)],
    ['非常勤計', sumArr(d.parttime)],
    ['たいようの丘', sumArr(d.taiyou_total)],
  ];
  cards.forEach(([label, val]) => {
    html += `<div class="sc"><div class="sv">${yen(val)}</div><div class="sl">${label}</div></div>`;
  });
  html += '</div></div>';

  // 医師個人テーブル
  html += '<div class="card"><h2>医師 月別支払い</h2><div class="tc"><table><thead><tr><th>医師名</th>';
  ms.forEach(m => html += `<th class="num">${m}</th>`);
  html += '<th class="num">合計</th></tr></thead><tbody>';
  d.doctors.forEach(doc => {
    const total = sumArr(doc.monthly_total);
    html += `<tr class="collapsible" onclick="toggleDoctorBreakdown(this)"><td>${doc.name} <span class="toggle-arrow">&#9654;</span></td>`;
    doc.monthly_total.forEach(v => html += `<td class="num pay-value">${yen(v)}</td>`);
    html += `<td class="num pay-value">${yen(total)}</td></tr>`;
    // 内訳行（hidden）
    const bk = doc.breakdown;
    for (const [key, vals] of Object.entries(bk)) {
      html += `<tr class="breakdown-row hidden"><td>${key}</td>`;
      vals.forEach(v => html += `<td class="num">${yen(v)}</td>`);
      html += `<td class="num">${yen(sumArr(vals))}</td></tr>`;
    }
  });
  // 医師小計
  html += '<tr class="total-row"><td>医師合計</td>';
  d.doctors_subtotal.forEach(v => html += `<td class="num pay-value">${yen(v)}</td>`);
  html += `<td class="num pay-value">${yen(sumArr(d.doctors_subtotal))}</td></tr>`;
  // 社会保険
  html += '<tr><td>社会保険</td>';
  d.doctors_social_insurance.forEach(v => html += `<td class="num">${yen(v)}</td>`);
  html += `<td class="num">${yen(sumArr(d.doctors_social_insurance))}</td></tr>`;
  // 非常勤
  html += '<tr><td>医師非常勤</td>';
  d.doctors_parttime.forEach(v => html += `<td class="num">${yen(v)}</td>`);
  html += `<td class="num">${yen(sumArr(d.doctors_parttime))}</td></tr>`;
  html += '</tbody></table></div></div>';

  // 一般職員テーブル
  html += renderStaffSection('一般職員 月別内訳', d.staff, d.staff_total, d.staff_social_insurance, ms);

  // 非常勤
  html += '<div class="card"><h2>非常勤</h2><div class="tc"><table><thead><tr><th>項目</th>';
  ms.forEach(m => html += `<th class="num">${m}</th>`);
  html += '<th class="num">合計</th></tr></thead><tbody>';
  html += '<tr><td>非常勤</td>';
  d.parttime.forEach(v => html += `<td class="num pay-value">${yen(v)}</td>`);
  html += `<td class="num pay-value">${yen(sumArr(d.parttime))}</td></tr>`;
  html += '<tr><td>社会保険</td>';
  d.parttime_social_insurance.forEach(v => html += `<td class="num">${yen(v)}</td>`);
  html += `<td class="num">${yen(sumArr(d.parttime_social_insurance))}</td></tr>`;
  html += '</tbody></table></div></div>';

  // たいようの丘テーブル
  html += renderStaffSection('たいようの丘 月別内訳', d.taiyou, d.taiyou_total, d.taiyou_social_insurance, ms);

  // 全体合計
  html += '<div class="card"><h2>全体合計</h2><div class="tc"><table><thead><tr><th>項目</th>';
  ms.forEach(m => html += `<th class="num">${m}</th>`);
  html += '<th class="num">合計</th></tr></thead><tbody>';
  html += '<tr class="total-row"><td>給与費</td>';
  d.grand_total_payroll.forEach(v => html += `<td class="num pay-value">${yen(v)}</td>`);
  html += `<td class="num pay-value">${yen(sumArr(d.grand_total_payroll))}</td></tr>`;
  html += '<tr><td>社会保険料</td>';
  d.grand_total_social.forEach(v => html += `<td class="num">${yen(v)}</td>`);
  html += `<td class="num">${yen(sumArr(d.grand_total_social))}</td></tr>`;
  html += '</tbody></table></div></div>';

  document.getElementById('sheetsContent').innerHTML = html;
}

function renderStaffSection(title, breakdown, total, social, ms) {
  const sumArr = arr => arr.reduce((a, b) => a + b, 0);
  let html = `<div class="card"><h2>${title}</h2><div class="tc"><table><thead><tr><th>項目</th>`;
  ms.forEach(m => html += `<th class="num">${m}</th>`);
  html += '<th class="num">合計</th></tr></thead><tbody>';
  for (const [key, vals] of Object.entries(breakdown)) {
    html += `<tr><td>${key}</td>`;
    vals.forEach(v => html += `<td class="num">${yen(v)}</td>`);
    html += `<td class="num">${yen(sumArr(vals))}</td></tr>`;
  }
  html += '<tr class="total-row"><td>合計</td>';
  total.forEach(v => html += `<td class="num pay-value">${yen(v)}</td>`);
  html += `<td class="num pay-value">${yen(sumArr(total))}</td></tr>`;
  html += '<tr><td>社会保険</td>';
  social.forEach(v => html += `<td class="num">${yen(v)}</td>`);
  html += `<td class="num">${yen(sumArr(social))}</td></tr>`;
  html += '</tbody></table></div></div>';
  return html;
}

function toggleDoctorBreakdown(row) {
  const arrow = row.querySelector('.toggle-arrow');
  let next = row.nextElementSibling;
  const expanding = next && next.classList.contains('hidden');
  while (next && next.classList.contains('breakdown-row')) {
    next.classList.toggle('hidden', !expanding);
    next = next.nextElementSibling;
  }
  if (arrow) arrow.innerHTML = expanding ? '&#9660;' : '&#9654;';
}

loadFolders();
