{% extends "base.html" %}
{% set active = 'reports' %}
{% block title %}SakigakeAPP - 診療報酬{% endblock %}
{% block content %}
<div class="reports-page sk-fade-in">
  <div class="reports-header">
    <h2 class="sk-h1">診療報酬レポート</h2>
    <div class="report-tabs" id="reportTabs"></div>
  </div>
  <div class="reports-body">
    <div id="emptyState" class="placeholder">
      <h2>診療報酬</h2>
      <p>レポートを選択してください</p>
    </div>
    <iframe id="reportFrame" class="app-frame" style="display:none"></iframe>
  </div>
</div>

<style>
.reports-page { display: flex; flex-direction: column; height: 100vh; }
.reports-header { padding: 24px 28px 16px; border-bottom: 1px solid var(--sk-surface-border); }
.reports-header h2 { margin-bottom: 16px; }
.report-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.report-tab {
  padding: 7px 16px; border: 1px solid var(--sk-surface-border);
  border-radius: var(--sk-radius-sm); background: var(--sk-bg-3);
  color: var(--sk-text-3); cursor: pointer; font-size: 13px;
  font-family: var(--sk-font); transition: all .15s var(--sk-ease);
  white-space: nowrap;
}
.report-tab:hover { border-color: var(--sk-primary); color: var(--sk-text); }
.report-tab.active { background: var(--sk-grad-primary); color: #fff; border-color: transparent; }
.reports-body { flex: 1; position: relative; }
.reports-body .placeholder { height: 100%; }
.reports-body .app-frame { width: 100%; height: 100%; border: none; background: var(--sk-bg-1); }
</style>

<script>
(function() {
  var tabs = document.getElementById('reportTabs');
  var frame = document.getElementById('reportFrame');
  var empty = document.getElementById('emptyState');
  var first = true;

  function friendlyName(filename) {
    return filename.replace(/\.html$/, '').replace(/_/g, ' ');
  }

  function showFrame(url, btn) {
    frame.src = url;
    frame.style.display = 'block';
    empty.style.display = 'none';
    tabs.querySelectorAll('.report-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
  }

  function addTab(label, url) {
    var btn = document.createElement('button');
    btn.className = 'report-tab';
    btn.textContent = label;
    btn.onclick = function() { showFrame(url, btn); };
    tabs.appendChild(btn);
    if (first) { btn.click(); first = false; }
  }

  // 年度レポート（入院収益など）
  fetch('/api/shinryo_annual')
    .then(function(r) { return r.json(); })
    .then(function(files) {
      files.forEach(function(f) {
        addTab(friendlyName(f), '/api/shinryo_annual/' + encodeURIComponent(f));
      });
    })
    .then(function() {
      // 月別レポート（薬剤など）
      return fetch('/api/reports/months').then(function(r) { return r.json(); });
    })
    .then(function(months) {
      months.forEach(function(m) {
        m.files.forEach(function(f) {
          addTab(friendlyName(f), '/api/reports/' + encodeURIComponent(m.month) + '/' + encodeURIComponent(f));
        });
      });
    });
})();
</script>
{% endblock %}
