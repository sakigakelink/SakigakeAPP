<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SakigakeAPP{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/design-system.css?v=2">
  <link rel="stylesheet" href="/static/css/portal.css?v=2">
</head>
<body class="sk-app">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">S</div>
      <div>
        <h1>Sakigake</h1>
        <p>Hospital Management</p>
      </div>
    </div>
    <ul class="nav-menu">
      <li><a href="/pnl" class="nav-link {% if active == 'pnl' %}active{% endif %}">
        <svg class="nav-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 000 2v8a2 2 0 002 2h2.586l-1.293 1.293a1 1 0 101.414 1.414L10 15.414l2.293 2.293a1 1 0 001.414-1.414L12.414 15H15a2 2 0 002-2V5a1 1 0 100-2H3zm11 4a1 1 0 10-2 0v4a1 1 0 102 0V7zm-3 1a1 1 0 10-2 0v3a1 1 0 102 0V8zM8 9a1 1 0 00-2 0v2a1 1 0 102 0V9z" clip-rule="evenodd"/></svg>
        <span>損益計算</span></a></li>
      <li><a href="/reports" class="nav-link {% if active == 'reports' %}active{% endif %}">
        <svg class="nav-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>
        <span>診療報酬</span></a></li>
      <li><a href="/salary" class="nav-link {% if active == 'salary' %}active{% endif %}">
        <svg class="nav-svg" viewBox="0 0 20 20" fill="currentColor"><path d="M4 4a2 2 0 00-2 2v1h16V6a2 2 0 00-2-2H4z"/><path fill-rule="evenodd" d="M18 9H2v5a2 2 0 002 2h12a2 2 0 002-2V9zM4 13a1 1 0 011-1h1a1 1 0 110 2H5a1 1 0 01-1-1zm5-1a1 1 0 100 2h1a1 1 0 100-2H9z" clip-rule="evenodd"/></svg>
        <span>給与分析</span></a></li>
      <li><a href="/master" class="nav-link {% if active == 'master' %}active{% endif %}">
        <svg class="nav-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
        <span>職員マスター</span></a></li>
      <li class="nav-group {% if active in ('shift', 'data') %}open{% endif %}">
        <button class="nav-link nav-group-toggle" type="button">
          <svg class="nav-svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/></svg>
          <span>シフト管理</span>
          <svg class="nav-chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
        </button>
        <ul class="nav-submenu">
          <li><a href="/shift" class="nav-link nav-sub-link {% if active == 'shift' %}active{% endif %}">
            <span>シフト作成</span></a></li>
          <li><a href="/data" class="nav-link nav-sub-link {% if active == 'data' %}active{% endif %}">
            <span>勤怠変換</span></a></li>
        </ul>
      </li>
    </ul>
    <div class="sidebar-footer">
      <div class="server-controls">
        <button id="btn-reload" class="btn-server btn-restart" type="button" title="ページ再読込">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd"/></svg>
          再読込
        </button>
        <button id="btn-restart" class="btn-server btn-restart" type="button" title="サーバー再起動">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v3.586L7.707 9.293a1 1 0 00-1.414 1.414l3 3a1 1 0 001.414 0l3-3a1 1 0 00-1.414-1.414L11 10.586V7z" clip-rule="evenodd"/></svg>
          再起動
        </button>
        <button id="btn-shutdown" class="btn-server btn-shutdown" type="button" title="サーバー停止">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1zm4 0a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
          終了
        </button>
      </div>
    </div>
  </nav>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/js/portal.js"></script>
</body>
</html>
